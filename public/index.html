<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wilnder - свайпай товары WB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="background-orb orb-1" aria-hidden="true"></div>
    <div class="background-orb orb-2" aria-hidden="true"></div>
    <div class="background-orb orb-3" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="top-wrap">
        <div class="brand-row">
          <div class="brand-mark">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 2.5c.9 5.2 3.8 8.1 9 9-5.2.9-8.1 3.8-9 9-.9-5.2-3.8-8.1-9-9 5.2-.9 8.1-3.8 9-9Z"
                fill="currentColor"
              />
            </svg>
            <h1>Wilnder</h1>
          </div>
          <button id="refreshButton" class="icon-circle" type="button" aria-label="Новая волна">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M20 12a8 8 0 1 1-2.3-5.7M20 4.8v4.6h-4.6"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              />
            </svg>
          </button>
        </div>
      </header>

      <section class="deck-panel" aria-live="polite">
        <div id="deck" class="deck"></div>
        <aside id="collectionPanel" class="collection-panel" hidden></aside>
      </section>

      <nav class="bottom-toolbar" aria-label="Навигация">
        <button
          id="tabSkipped"
          class="toolbar-button"
          data-tab="skipped"
          type="button"
          aria-label="Скипнутые"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M17.5 7 7 17.5M7 7l10.5 10.5"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.2"
            />
          </svg>
          <span>Скипнутые</span>
          <strong id="passesCount" class="toolbar-count">0</strong>
        </button>
        <button
          id="tabHome"
          class="toolbar-button is-active"
          data-tab="home"
          type="button"
          aria-label="Главная"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M4.5 11.3 12 5l7.5 6.3V20H4.5v-8.7Z"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
            />
          </svg>
          <span>Главная</span>
        </button>
        <button
          id="tabLiked"
          class="toolbar-button"
          data-tab="liked"
          type="button"
          aria-label="Лайкнутые"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M20.5 8a4.6 4.6 0 0 0-6.4 0L12 10.1 9.9 8a4.6 4.6 0 0 0-6.4 6.5L12 22l8.5-7.5a4.6 4.6 0 0 0 0-6.5Z"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
            />
          </svg>
          <span>Лайкнутые</span>
          <strong id="likesCount" class="toolbar-count">0</strong>
        </button>
      </nav>
    </main>

    <template id="cardTemplate">
      <article class="wb-card">
        <span class="swipe-badge swipe-left">СКИП</span>
        <span class="swipe-badge swipe-right">ЛАЙК</span>
        <div class="card-media-wrap">
          <p class="match-badge"></p>
          <img class="card-media" alt="" loading="eager" />
          <div class="card-overlay">
            <h2 class="profile-title"></h2>
            <button class="distance-copy" type="button" aria-label="Скопировать артикул">
              <svg class="pin-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 21s6-5.4 6-11a6 6 0 1 0-12 0c0 5.6 6 11 6 11Zm0-8.2a2.6 2.6 0 1 0 0-5.2 2.6 2.6 0 0 0 0 5.2Z"
                  fill="currentColor"
                />
              </svg>
              <span class="card-article"></span>
              <svg class="copy-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M8 8.2a2.2 2.2 0 0 1 2.2-2.2h8A2.2 2.2 0 0 1 20.4 8v9.8a2.2 2.2 0 0 1-2.2 2.2h-8A2.2 2.2 0 0 1 8 17.8V8.2Zm-4.4-2A2.2 2.2 0 0 1 5.8 4h8.1"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.8"
                />
              </svg>
            </button>
            <p class="profile-subtitle"></p>
          </div>
        </div>
        <a class="card-link" target="_blank" rel="noopener noreferrer">Открыть на WB</a>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
